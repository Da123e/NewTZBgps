<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>位置追踪 - 阿里云地图视图</title>
    <!-- 仅引入Leaflet核心库（无其他依赖） -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; }
        .container { display: flex; height: 100vh; }
        /* 侧边栏 */
        .sidebar { width: 300px; padding: 20px; background: #f5f5f5; border-right: 1px solid #ddd; overflow-y: auto; }
        .sidebar h2 { margin-bottom: 20px; color: #333; }
        .device-list { list-style: none; }
        .device-item { padding: 10px; margin-bottom: 8px; background: white; border-radius: 4px; cursor: pointer; transition: background 0.2s; }
        .device-item:hover { background: #e9ecef; }
        .device-item.active { background: #007bff; color: white; }
        /* 地图容器 */
        .map-container { flex: 1; position: relative; }
        #map { width: 100%; height: 100%; }
        .loading { padding: 20px; text-align: center; color: #666; }
        /* 地图状态提示 */
        .map-status {
            position: absolute; top: 10px; right: 10px;
            background: white; padding: 8px 12px; border-radius: 4px;
            font-size: 12px; color: #333; z-index: 999;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 侧边栏：设备列表 -->
    <div class="sidebar">
        <h2>设备列表</h2>
        <div id="loading" class="loading">加载设备中...</div>
        <ul id="deviceList" class="device-list" style="display: none;"></ul>
    </div>
    <!-- 地图容器 -->
    <div class="map-container">
        <div id="map"></div>
        <div id="mapStatus" class="map-status">正在加载阿里云地图...</div>
    </div>
</div>

<script>
    // 初始化地图（默认定位到你的城市，可修改经纬度）
    const map = L.map('map', {
        zoomControl: true,
        attributionControl: false
    }).setView([30.5928, 114.3055], 12); // 武汉：30.5928,114.3055 | 北京：39.9042,116.4074

    // ========== 核心：纯原生阿里云瓦片地址（无任何依赖） ==========
    // 阿里云电子底图（100%可访问）
    const aliBaseLayer = L.tileLayer('https://webrd02.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
        maxZoom: 18,
        minZoom: 1,
        attribution: '© 阿里云 DataV'
    });

    // 阿里云标注层（显示地名/道路）
    const aliAnnoLayer = L.tileLayer('https://webst02.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
        maxZoom: 18,
        minZoom: 1
    });

    // 加载地图并监听状态
    aliBaseLayer.addTo(map);
    aliAnnoLayer.addTo(map);

    // 地图加载成功/失败监听
    let mapLoaded = false;
    aliBaseLayer.on('load', function() {
        if (!mapLoaded) {
            mapLoaded = true;
            document.getElementById('mapStatus').textContent = '阿里云地图加载成功';
            document.getElementById('mapStatus').style.color = '#28a745';
        }
    });

    // 超时兜底（5秒未加载则切换备用源）
    setTimeout(() => {
        if (!mapLoaded) {
            document.getElementById('mapStatus').textContent = '切换到备用地图源...';
            // 移除阿里云图层，切换到高德备用源
            map.removeLayer(aliBaseLayer);
            map.removeLayer(aliAnnoLayer);
            // 高德底图（国内绝对稳定）
            const gaodeLayer = L.tileLayer('https://wprd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&style=7&x={x}&y={y}&z={z}', {
                subdomains: ['1','2','3','4'],
                maxZoom: 18,
                minZoom: 1
            }).addTo(map);
            const gaodeAnnoLayer = L.tileLayer('https://wprd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&style=8&x={x}&y={y}&z={z}', {
                subdomains: ['1','2','3','4'],
                maxZoom: 18,
                minZoom: 1
            }).addTo(map);
            // 更新状态提示
            document.getElementById('mapStatus').textContent = '备用地图（高德）加载成功';
            document.getElementById('mapStatus').style.color = '#28a745';
        }
    }, 5000);

    let markers = {}; // 存储设备标记
    let currentDeviceId = null; // 当前选中的设备ID

    // 获取所有设备列表
    async function getDeviceList() {
        try {
            const response = await fetch('/api/get_devices');
            const result = await response.json();
            if (result.code === 200) {
                renderDeviceList(result.data);
                // 默认选中第一个设备
                if (result.data.length > 0) {
                    selectDevice(result.data[0].device_id);
                }
            } else {
                alert('获取设备列表失败: ' + result.msg);
            }
        } catch (error) {
            alert('请求设备列表失败: ' + error.message);
        } finally {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('deviceList').style.display = 'block';
        }
    }

    // 渲染设备列表
    function renderDeviceList(devices) {
        const deviceList = document.getElementById('deviceList');
        deviceList.innerHTML = '';

        if (devices.length === 0) {
            deviceList.innerHTML = '<li class="device-item">暂无设备数据</li>';
            return;
        }

        devices.forEach(device => {
            const li = document.createElement('li');
            li.className = 'device-item';
            li.dataset.deviceId = device.device_id;
            li.textContent = `设备 ${device.device_id} (${device.record_count} 条记录)`;
            li.addEventListener('click', () => selectDevice(device.device_id));
            deviceList.appendChild(li);
        });
    }

    // 选中设备并加载定位数据
    async function selectDevice(deviceId) {
        // 移除之前的标记
        Object.values(markers).forEach(marker => map.removeLayer(marker));
        markers = {};

        // 更新选中状态
        document.querySelectorAll('.device-item').forEach(item => {
            item.classList.toggle('active', item.dataset.deviceId === deviceId);
        });
        currentDeviceId = deviceId;

        // 获取该设备的定位记录
        try {
            const response = await fetch(`/api/get_device_locations?device_id=${deviceId}`);
            const result = await response.json();
            if (result.code === 200) {
                renderDeviceLocations(result.data);
            } else {
                alert('获取设备定位数据失败: ' + result.msg);
            }
        } catch (error) {
            alert('请求定位数据失败: ' + error.message);
        }
    }

    // 在地图上渲染设备定位点
    function renderDeviceLocations(locations) {
        if (locations.length === 0) {
            alert('该设备暂无定位记录');
            return;
        }

        // 添加标记并移动地图到第一个点
        locations.forEach((loc, index) => {
            // 原生标记（无需自定义图标，避免加载失败）
            const speedDisplay = loc.speed ? `${loc.speed.toFixed(2)} m/s` : '未获取';
            const marker = L.marker([loc.latitude, loc.longitude])
                .bindPopup(`
                    <div style="min-width: 200px;">
                        <p><strong>设备ID</strong>: ${loc.device_id}</p>
                        <p><strong>定位时间</strong>: ${loc.timestamp}</p>
                        <p><strong>地址</strong>: ${loc.address || '未获取'}</p>
                        <p><strong>精度</strong>: ${loc.accuracy.toFixed(2)} 米</p>
                        <p><strong>速度</strong>: ${speedDisplay}</p>
                    </div>
                `)
                .addTo(map);
            markers[loc.id] = marker;

            // 第一个点居中显示
            if (index === 0) {
                map.setView([loc.latitude, loc.longitude], 15);
            }
        });

        // 绘制轨迹线（如果有多个点）
        if (locations.length > 1) {
            const latlngs = locations.map(loc => [loc.latitude, loc.longitude]);
            L.polyline(latlngs, {
                color: '#007bff',
                weight: 3,
                opacity: 0.8
            }).addTo(map);
        }
    }

    // 页面加载时初始化
    window.onload = function() {
        getDeviceList();
    };
</script>
</body>
</html>
